<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruno's Deep Sea Creature — 3D Visualizer & Crafting Planner</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Correct non-module OrbitControls CDN compatible with standard script tags -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- React & ReactDOM CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel CDN for compiling JSX in-browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>

  <style>
    /* Styling custom sliders and hiding scrollbars beautifully */
    input[type="range"]::-webkit-slider-thumb {
      background: #7B4F2E;
      border: 2px solid #F5ECD7;
      border-radius: 9999px;
      cursor: pointer;
      width: 16px;
      height: 16px;
      appearance: none;
      margin-top: -4px;
      box-shadow: 0 0 8px rgba(123, 79, 46, 0.5);
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: #27272a;
      height: 8px;
      border-radius: 9999px;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }
    /* Simple pulsed glow */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(123, 79, 46, 0.3); }
      50% { box-shadow: 0 0 20px rgba(123, 79, 46, 0.6); }
    }
    .crafting-btn-glow {
      animation: pulse-glow 3s infinite;
    }
  </style>
</head>
<body class="bg-[#060608] text-white font-sans antialiased select-none overflow-hidden h-screen w-screen">

  <div id="root" class="h-full w-full"></div>

  <!-- React Script containing state, UI and ThreeJS implementation -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // WEB AUDIO DEEP-SEA AMBIENT GENERATOR
    class DeepSeaAudioManager {
      constructor() {
        this.ctx = null;
        this.ambientOsc = null;
        this.ambientGain = null;
        this.sonarInterval = null;
        this.isPlaying = false;
      }

      start() {
        if (this.isPlaying) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          
          // 1. Deep Submarine Ocean Rumble
          this.ambientOsc = this.ctx.createOscillator();
          this.ambientOsc.type = 'triangle';
          this.ambientOsc.frequency.value = 45; // ultra-low water frequency
          
          const filter = this.ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 75; // cut off everything else
          
          const lfo = this.ctx.createOscillator();
          lfo.frequency.value = 0.12; // slow underwater swell cycle
          
          const lfoGain = this.ctx.createGain();
          lfoGain.gain.value = 0.05;
          
          this.ambientGain = this.ctx.createGain();
          this.ambientGain.gain.value = 0.1;
          
          lfo.connect(lfoGain);
          lfoGain.connect(this.ambientGain.gain);
          
          this.ambientOsc.connect(filter);
          filter.connect(this.ambientGain);
          this.ambientGain.connect(this.ctx.destination);
          
          lfo.start();
          this.ambientOsc.start();
          
          // 2. Play first ping, then set interval
          this.playSonarPing();
          this.sonarInterval = setInterval(() => {
            this.playSonarPing();
          }, 10000);
          
          this.isPlaying = true;
        } catch (e) {
          console.warn("AudioContext failed to start:", e);
        }
      }

      playSonarPing() {
        if (!this.ctx || this.ctx.state === 'suspended') return;
        try {
          const time = this.ctx.currentTime;
          const ping = this.ctx.createOscillator();
          ping.type = 'sine';
          ping.frequency.setValueAtTime(840, time);
          ping.frequency.exponentialRampToValueAtTime(760, time + 0.2); // downward sweep
          
          const gain = this.ctx.createGain();
          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(0.08, time + 0.03); // fast attack
          gain.gain.exponentialRampToValueAtTime(0.001, time + 3.0); // long sonar echo decay
          
          const delay = this.ctx.createDelay();
          delay.delayTime.value = 0.6; // submarine sonar echoing
          
          const delayGain = this.ctx.createGain();
          delayGain.gain.value = 0.35;
          
          ping.connect(gain);
          gain.connect(this.ctx.destination);
          
          gain.connect(delay);
          delay.connect(delayGain);
          delayGain.connect(this.ctx.destination);
          
          ping.start(time);
          ping.stop(time + 3.5);
        } catch (e) {
          console.error(e);
        }
      }

      stop() {
        if (!this.isPlaying) return;
        try {
          if (this.ambientOsc) {
            this.ambientOsc.stop();
            this.ambientOsc.disconnect();
          }
          if (this.ambientGain) {
            this.ambientGain.disconnect();
          }
          if (this.sonarInterval) {
            clearInterval(this.sonarInterval);
          }
          if (this.ctx) {
            this.ctx.close();
          }
          this.isPlaying = false;
        } catch (e) {
          console.error(e);
        }
      }
    }

    function App() {
      // Audio reference
      const audioManager = useMemo(() => new DeepSeaAudioManager(), []);
      const [soundEnabled, setSoundEnabled] = useState(false);

      // WebGL & Interaction States
      const canvasRef = useRef(null);
      const [viewMode, setViewMode] = useState('match'); // 'match' (side orthographic) or 'orbit' (full 3D)
      const [renderStyle, setRenderStyle] = useState('organic'); // 'organic' or 'recycled'
      const [showWireframe, setShowWireframe] = useState(false);
      const [referenceOpacity, setReferenceOpacity] = useState(0.8);
      const [modelOpacity, setModelOpacity] = useState(0.5); // opacity of solid mesh in match view
      const [autoRotate, setAutoRotate] = useState(true);

      // Model Shape Parameters (Tweakable by Bruno to match his sketch!)
      const [params, setParams] = useState({
        bodyLength: 4.5,
        bodyHeight: 1.25,
        bodyRearSwell: 1.45,
        rostrumLength: 2.8,
        rostrumHeight: 0.18,
        dorsalScale: 1.1,
        dorsalX: 1.2,
        ventralScale: 0.9,
        ventralX: -0.4,
        eyeSize: 0.28,
        eyeX: -0.9,
        eyeY: 0.42,
        tentacleLength: 4.2,
        tentacleWiggle: 1.5,
      });

      // Crafting materials checklist
      const [checklist, setChecklist] = useState({
        bodyBottle: false,
        snoutCardboard: false,
        finsShipping: false,
        eyeBottleCap: false,
        teethEggCarton: false,
        tentaclesNewspaper: false,
        redTentaclesHose: false,
        hotGlueTape: false,
      });

      const handleCheck = (key) => {
        setChecklist(prev => ({ ...prev, [key]: !prev[key] }));
      };

      // Reset parameters to default alignment
      const resetParams = () => {
        setParams({
          bodyLength: 4.5,
          bodyHeight: 1.25,
          bodyRearSwell: 1.45,
          rostrumLength: 2.8,
          rostrumHeight: 0.18,
          dorsalScale: 1.1,
          dorsalX: 1.2,
          ventralScale: 0.9,
          ventralX: -0.4,
          eyeSize: 0.28,
          eyeX: -0.9,
          eyeY: 0.42,
          tentacleLength: 4.2,
          tentacleWiggle: 1.5,
        });
      };

      // Handle Slider Change
      const updateParam = (key, val) => {
        setParams(prev => ({ ...prev, [key]: parseFloat(val) }));
      };

      // Toggle Sound
      const toggleSound = () => {
        if (soundEnabled) {
          audioManager.stop();
          setSoundEnabled(false);
        } else {
          audioManager.start();
          setSoundEnabled(true);
        }
      };

      // Three.js References
      const rendererRef = useRef(null);
      const sceneRef = useRef(null);
      const orthoCameraRef = useRef(null);
      const perspCameraRef = useRef(null);
      const controlsRef = useRef(null);
      
      // Creature 3D elements references
      const creatureGroupRef = useRef(null);
      const refPlaneRef = useRef(null);
      const tentacleChainsRef = useRef([]); // Stores chains of waving tentacle joint meshes

      // Custom Procedural Textures (Cardboard lines, soda labels)
      const cardboardTexture = useMemo(() => {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        // Cardboard core brown
        ctx.fillStyle = '#a16207';
        ctx.fillRect(0, 0, 128, 128);
        // Cardboard corrugated stripes
        ctx.strokeStyle = '#854d0e';
        ctx.lineWidth = 4;
        for (let i = 0; i < 128; i += 16) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, 128);
          ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(2, 2);
        return tex;
      }, []);

      const bottleLabelTexture = useMemo(() => {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        // Soda design
        ctx.fillStyle = '#2563eb'; // blue
        ctx.fillRect(0, 0, 512, 128);
        
        ctx.fillStyle = '#22c55e'; // green stripe
        ctx.fillRect(0, 100, 512, 28);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText('ECO-SPARKLING SODA', 40, 50);
        
        ctx.font = 'italic 14px sans-serif';
        ctx.fillText('2 Liters • Refillable Plastic', 40, 80);
        
        ctx.strokeStyle = '#facc15'; // yellow accent
        ctx.lineWidth = 4;
        ctx.strokeRect(10, 10, 492, 108);

        const tex = new THREE.CanvasTexture(canvas);
        return tex;
      }, []);

      // Generates fallback hand-drawn pencil outline texture if local file is missing
      const sketchFallbackTexture = useMemo(() => {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Transparent background
        ctx.clearRect(0, 0, 1024, 512);

        // Pencil styling sketch lines
        ctx.strokeStyle = 'rgba(40, 40, 40, 0.7)';
        ctx.lineWidth = 3.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Custom function to draw scribbly wobbly lines
        const drawHandLine = (points) => {
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) {
            // Introduce subtle hand-drawn randomness
            const wobbleX = (Math.random() - 0.5) * 2;
            const wobbleY = (Math.random() - 0.5) * 2;
            ctx.lineTo(points[i].x + wobbleX, points[i].y + wobbleY);
          }
          ctx.stroke();
        };

        // Draw body silhouette outline
        // Coordinates corresponding roughly to the creature's oval body:
        const bodyPoints = [];
        for (let i = 0; i <= 40; i++) {
          const t = i / 40;
          const x = 320 + t * 380; // X from 320 to 700
          
          let radius = 100;
          if (t < 0.3) {
            const u = t / 0.3;
            radius = 30 + 70 * Math.sin(u * Math.PI / 2);
          } else if (t >= 0.3 && t <= 0.8) {
            const u = (t - 0.3) / 0.5;
            radius = 100 + 45 * Math.sin(u * Math.PI / 2);
          } else {
            const u = (t - 0.8) / 0.2;
            radius = 145 - 50 * u * u;
          }
          
          bodyPoints.push({ x, y: 256 - radius });
        }
        for (let i = 40; i >= 0; i--) {
          const t = i / 40;
          const x = 320 + t * 380;
          
          let radius = 100;
          if (t < 0.3) {
            const u = t / 0.3;
            radius = 30 + 70 * Math.sin(u * Math.PI / 2);
          } else if (t >= 0.3 && t <= 0.8) {
            const u = (t - 0.3) / 0.5;
            radius = 100 + 45 * Math.sin(u * Math.PI / 2);
          } else {
            const u = (t - 0.8) / 0.2;
            radius = 145 - 50 * u * u;
          }
          
          bodyPoints.push({ x, y: 256 + radius });
        }
        drawHandLine(bodyPoints);

        // Draw rostrum (snout pointing left)
        const rostrum = [
          { x: 320, y: 240 },
          { x: 120, y: 250 }, // pointy tip
          { x: 320, y: 260 }
        ];
        drawHandLine(rostrum);

        // Draw dorsal fin
        const dorsal = [
          { x: 550, y: 150 },
          { x: 620, y: 60 }, // tip
          { x: 650, y: 120 }
        ];
        drawHandLine(dorsal);

        // Draw ventral fin
        const ventral = [
          { x: 440, y: 350 },
          { x: 460, y: 410 }, // tip down
          { x: 500, y: 345 }
        ];
        drawHandLine(ventral);

        // Draw eye
        ctx.beginPath();
        ctx.arc(430, 210, 22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(10, 10, 10, 0.95)';
        ctx.fill();
        ctx.stroke();

        // Draw jagged mouth
        const mouth = [
          { x: 390, y: 275 },
          { x: 410, y: 285 },
          { x: 420, y: 275 },
          { x: 435, y: 285 },
          { x: 450, y: 275 }
        ];
        drawHandLine(mouth);

        // Draw tentacles (5 wavy tails)
        for (let k = 0; k < 5; k++) {
          const tPts = [];
          const startY = 180 + k * 35;
          const amplitude = 30 + k * 5;
          for (let step = 0; step <= 20; step++) {
            const frac = step / 20;
            const tx = 700 + frac * 200;
            const ty = startY + Math.sin(frac * Math.PI * 2.5) * amplitude;
            tPts.push({ x: tx, y: ty });
          }
          drawHandLine(tPts);
        }

        const tex = new THREE.CanvasTexture(canvas);
        return tex;
      }, []);

      // THREE.JS INITIALIZATION
      useEffect(() => {
        if (!canvasRef.current) return;

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#060608');
        sceneRef.current = scene;

        // 2. Camera Setup
        const width = canvasRef.current.clientWidth;
        const height = canvasRef.current.clientHeight;

        // Orthographic Camera (Perfect for Side Matching)
        const aspect = width / height;
        const d = 4.0;
        const orthoCamera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
        orthoCamera.position.set(0, 0, 10);
        orthoCamera.lookAt(0, 0, 0);
        orthoCameraRef.current = orthoCamera;

        // Perspective Camera (For Orbit Rotation)
        const perspCamera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
        perspCamera.position.set(4, 2, 7.5);
        perspCameraRef.current = perspCamera;

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ canvas: canvasRef.current, antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        rendererRef.current = renderer;

        // 4. Lights Setup
        // Warm key light above-left (#FFF5E0, intensity 1.2)
        const keyLight = new THREE.DirectionalLight('#FFF5E0', 1.3);
        keyLight.position.set(-5, 6, 4);
        scene.add(keyLight);

        // Cool dim fill below-right (#C8E0FF, intensity 0.3)
        const fillLight = new THREE.DirectionalLight('#C8E0FF', 0.45);
        fillLight.position.set(5, -4, -3);
        scene.add(fillLight);

        // Ambient deep-sea blue fill
        const ambientLight = new THREE.AmbientLight('#0a1128', 0.6);
        scene.add(ambientLight);

        // 5. OrbitControls (using standard fallback)
        const controls = new THREE.OrbitControls(perspCamera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 15;
        controls.minDistance = 3.5;
        controlsRef.current = controls;

        // 6. Base Creature Group
        const creatureGroup = new THREE.Group();
        scene.add(creatureGroup);
        creatureGroupRef.current = creatureGroup;

        // 7. Reference Image Plane (Background layer for aligning)
        const refGeo = new THREE.PlaneGeometry(8, 4);
        const refMat = new THREE.MeshBasicMaterial({
          transparent: true,
          opacity: referenceOpacity,
          side: THREE.DoubleSide,
          depthWrite: false
        });

        const refMesh = new THREE.Mesh(refGeo, refMat);
        refMesh.position.set(0, 0, -0.05); // slightly behind creature origin
        scene.add(refMesh);
        refPlaneRef.current = refMesh;

        // Try to load Gemini_Generated_Image_gyg3magyg3magyg3.png cutout. If fail, fall back to procedural sketch.
        const loader = new THREE.TextureLoader();
        loader.load(
          'Gemini_Generated_Image_gyg3magyg3magyg3.png',
          (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            refMat.map = texture;
            refMat.needsUpdate = true;
          },
          undefined,
          (err) => {
            // Fall back to high quality hand drawn canvas texture
            refMat.map = sketchFallbackTexture;
            refMat.needsUpdate = true;
          }
        );

        // 8. Animation Loop
        const clock = new THREE.Clock();
        let animationFrameId;

        const animate = () => {
          animationFrameId = requestAnimationFrame(animate);

          const time = clock.getElapsedTime();

          // Smoothly animate squid-like tentacles waving
          if (tentacleChainsRef.current && tentacleChainsRef.current.length > 0) {
            tentacleChainsRef.current.forEach((chain, i) => {
              const speed = 3.5;
              // Slightly shift speeds so red tentacles look unique
              const actualSpeed = speed * (i >= 8 ? 0.85 : 1.0);
              const angleOffset = (i * Math.PI / 4);
              const wiggleAmp = 0.12 * params.tentacleWiggle;

              chain.forEach((jointGroup, j) => {
                if (j === 0) return; // skip base attachment group
                const delay = j * 0.32;
                // Fluid organic sine wave propagation
                jointGroup.rotation.y = Math.sin(time * actualSpeed - delay + angleOffset) * wiggleAmp;
                jointGroup.rotation.z = Math.cos(time * actualSpeed - delay + angleOffset) * (wiggleAmp * 0.7);
              });
            });
          }

          // Slow Y auto-rotation when Orbit mode is active
          if (viewMode === 'orbit' && autoRotate && !(controls && controls.state !== -1)) {
            creatureGroup.rotation.y += 0.006;
            // slowly align X/Z rotations back to neutral upright posture
            creatureGroup.rotation.x += (0 - creatureGroup.rotation.x) * 0.05;
            creatureGroup.rotation.z += (0 - creatureGroup.rotation.z) * 0.05;
          } else if (viewMode === 'match') {
            // Lock rotation completely in match orthographic view to allow exact alignment
            creatureGroup.rotation.set(0, 0, 0);
          }

          // Update orbit controls
          if (viewMode === 'orbit') {
            controls.update();
          }

          // Render with active camera
          const activeCamera = viewMode === 'match' ? orthoCamera : perspCamera;
          renderer.render(scene, activeCamera);
        };

        animate();

        // 9. Resize handler
        const handleResize = () => {
          if (!canvasRef.current) return;
          const w = canvasRef.current.clientWidth;
          const h = canvasRef.current.clientHeight;
          const aspect = w / h;

          renderer.setSize(w, h);

          // Update cameras
          perspCamera.aspect = aspect;
          perspCamera.updateProjectionMatrix();

          orthoCamera.left = -d * aspect;
          orthoCamera.right = d * aspect;
          orthoCamera.top = d;
          orthoCamera.bottom = -d;
          orthoCamera.updateProjectionMatrix();
        };
        window.addEventListener('resize', handleResize);

        // Cleanup
        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
          renderer.dispose();
        };
      }, [viewMode, autoRotate]);

      // UPDATE CREATURE GEOMETRIES ON PARAMETERS CHANGE
      useEffect(() => {
        if (!sceneRef.current || !creatureGroupRef.current) return;

        const group = creatureGroupRef.current;
        // Clean old meshes inside group
        while (group.children.length > 0) {
          const obj = group.children[0];
          group.remove(obj);
        }

        // Generate elements based on selection ('organic' or 'recycled')
        const isRecycled = renderStyle === 'recycled';

        // 1. MAIN BODY GEOMETRY (Large Elongated Oval, wider at rear, tapered front)
        const bodyLen = params.bodyLength;
        const bodyHeight = params.bodyHeight;
        const swell = params.bodyRearSwell;
        
        const segmentsX = 32;
        const segmentsTheta = 24;
        const bodyGeo = new THREE.BufferGeometry();
        const vertices = [];
        const colors = [];
        const uvs = [];
        const indices = [];

        const xMin = -bodyLen / 2;
        const xMax = bodyLen / 2;

        const cDorsal = new THREE.Color('#7B4F2E');
        const cVentral = new THREE.Color('#F5ECD7');

        for (let i = 0; i <= segmentsX; i++) {
          const u = i / segmentsX;
          const x = xMin + u * bodyLen;
          
          let radius = 1.0;
          if (u < 0.25) {
            const t = u / 0.25;
            radius = 0.3 + 0.7 * Math.sin(t * Math.PI / 2);
          } else if (u >= 0.25 && u <= 0.8) {
            const t = (u - 0.25) / 0.55;
            radius = 1.0 + (swell - 1.0) * Math.sin(t * Math.PI / 2);
          } else {
            const t = (u - 0.8) / 0.2;
            radius = swell - (swell - 0.8) * t * t; // slightly wider tail root cap
          }
          
          radius *= bodyHeight;

          for (let j = 0; j <= segmentsTheta; j++) {
            const theta = (j / segmentsTheta) * Math.PI * 2;
            
            // Proportions: vertical oval shape
            const scaleY = 1.15;
            const scaleZ = 0.95;

            const y = radius * scaleY * Math.sin(theta);
            const z = radius * scaleZ * Math.cos(theta);

            vertices.push(x, y, z);
            uvs.push(u, j / segmentsTheta);

            // Smooth vertex color gradient along vertical Y axis
            const yMax = radius * scaleY;
            const yMin = -radius * scaleY;
            const normY = (y - yMin) / (yMax - yMin || 1);
            const blend = Math.pow(Math.max(0, Math.min(1, normY)), 1.3);
            const color = new THREE.Color().copy(cVentral).lerp(cDorsal, blend);
            colors.push(color.r, color.g, color.b);
          }
        }

        for (let i = 0; i < segmentsX; i++) {
          for (let j = 0; j < segmentsTheta; j++) {
            const p1 = i * (segmentsTheta + 1) + j;
            const p2 = p1 + 1;
            const p3 = (i + 1) * (segmentsTheta + 1) + j;
            const p4 = p3 + 1;
            indices.push(p1, p3, p2);
            indices.push(p2, p3, p4);
          }
        }

        bodyGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        bodyGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        bodyGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
        bodyGeo.setIndex(indices);
        bodyGeo.computeVertexNormals();

        let bodyMat;
        if (isRecycled) {
          // Sprite bottle look: translucent green plastic, low roughness
          bodyMat = new THREE.MeshStandardMaterial({
            color: '#22c55e',
            transparent: true,
            opacity: 0.65,
            roughness: 0.15,
            metalness: 0.05,
            wireframe: showWireframe
          });
        } else {
          bodyMat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.65,
            metalness: 0.0,
            wireframe: showWireframe,
            transparent: viewMode === 'match',
            opacity: viewMode === 'match' ? modelOpacity : 1.0
          });
        }

        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.castShadow = true;
        bodyMesh.receiveShadow = true;
        group.add(bodyMesh);

        // RECYCLED BOTTLE ADD-ONS (Ribbed lines & printed label)
        if (isRecycled && !showWireframe) {
          // Add recycled plastic ridges around body
          const ringCounts = 4;
          for (let k = 1; k < ringCounts; k++) {
            const ringU = 0.25 + (k / ringCounts) * 0.55;
            const ringX = xMin + ringU * bodyLen;
            
            // radius approximation
            const t = (ringU - 0.25) / 0.55;
            const r = (1.0 + (swell - 1.0) * Math.sin(t * Math.PI / 2)) * bodyHeight;

            const ringGeo = new THREE.TorusGeometry(r * 1.03, 0.04, 8, 24);
            ringGeo.rotateY(Math.PI / 2);
            const ringMat = new THREE.MeshStandardMaterial({ color: '#16a34a', roughness: 0.2, transparent: true, opacity: 0.8 });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.position.set(ringX, 0, 0);
            group.add(ringMesh);
          }

          // Add Coca-cola / Eco-soda cardboard label in center of bottle
          const labelWidth = bodyLen * 0.25;
          const labelRad = (1.0 + (swell - 1.0) * Math.sin(0.4 * Math.PI)) * bodyHeight * 1.02;
          const labelGeo = new THREE.CylinderGeometry(labelRad, labelRad, labelWidth, 24, 1, true);
          labelGeo.rotateZ(Math.PI / 2);
          const labelMat = new THREE.MeshStandardMaterial({
            map: bottleLabelTexture,
            roughness: 0.8,
            side: THREE.DoubleSide
          });
          const labelMesh = new THREE.Mesh(labelGeo, labelMat);
          labelMesh.position.set(xMin + 0.55 * bodyLen, 0, 0);
          group.add(labelMesh);
        }

        // 2. ROSTRUM (Snout extending from front left)
        const rostLen = params.rostrumLength;
        const rostThick = params.rostrumHeight;
        const rostGeo = new THREE.ConeGeometry(0.35 * bodyHeight, rostLen, 16);
        rostGeo.rotateZ(Math.PI / 2); // align horizontally
        
        // Flatten rostrum along vertical axes to match "long flat snout" description
        rostGeo.scale(1.0, rostThick, 0.4);

        let rostMat;
        if (isRecycled) {
          // Cardboard cone look
          rostMat = new THREE.MeshStandardMaterial({
            map: cardboardTexture,
            roughness: 0.95,
            wireframe: showWireframe
          });
        } else {
          rostMat = new THREE.MeshStandardMaterial({
            color: '#7B4F2E', // dorsal warm brown
            roughness: 0.65,
            wireframe: showWireframe,
            transparent: viewMode === 'match',
            opacity: viewMode === 'match' ? modelOpacity : 1.0
          });
        }

        const rostMesh = new THREE.Mesh(rostGeo, rostMat);
        // Position attached to base of body (left side)
        rostMesh.position.set(xMin - rostLen / 2 + 0.1, 0, 0);
        group.add(rostMesh);

        // Recycled: Add white masking tape ring around cardboard snout
        if (isRecycled && !showWireframe) {
          const tapeGeo = new THREE.CylinderGeometry(0.18, 0.2, 0.4, 16, 1, false);
          tapeGeo.rotateZ(Math.PI / 2);
          const tapeMat = new THREE.MeshStandardMaterial({ color: '#fef08a', roughness: 0.7, transparent: true, opacity: 0.8 });
          const tape = new THREE.Mesh(tapeGeo, tapeMat);
          tape.position.set(xMin - rostLen / 3, 0, 0);
          group.add(tape);
        }

        // Helper function to build custom extruded shape for fins
        const buildExtrudedFin = (shapePoints, thickness, color, isDorsal) => {
          const shape = new THREE.Shape();
          shape.moveTo(shapePoints[0].x, shapePoints[0].y);
          for (let k = 1; k < shapePoints.length; k++) {
            shape.lineTo(shapePoints[k].x, shapePoints[k].y);
          }
          shape.closePath();

          const extrudeSettings = {
            depth: thickness,
            bevelEnabled: true,
            bevelSegments: 2,
            steps: 1,
            bevelSize: 0.02,
            bevelThickness: 0.02
          };

          const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
          geo.center(); // centers pivot
          
          let mat;
          if (isRecycled) {
            mat = new THREE.MeshStandardMaterial({
              map: cardboardTexture,
              roughness: 0.9,
              wireframe: showWireframe
            });
          } else {
            mat = new THREE.MeshStandardMaterial({
              color: color,
              roughness: 0.7,
              wireframe: showWireframe,
              transparent: viewMode === 'match',
              opacity: viewMode === 'match' ? modelOpacity : 1.0
            });
          }

          const mesh = new THREE.Mesh(geo, mat);
          mesh.castShadow = true;
          return mesh;
        };

        // 3. DORSAL FIN (Upright, rear-center top)
        // Scaled and positioned based on parameters
        const dScale = params.dorsalScale;
        const dPoints = [
          new THREE.Vector2(0, 0),
          new THREE.Vector2(0.2 * dScale, 0.7 * dScale),
          new THREE.Vector2(0.8 * dScale, 1.1 * dScale), // fin tip curve
          new THREE.Vector2(1.1 * dScale, 0)
        ];
        // Calculate dorsal anchor body radius
        const dorsalU = (params.dorsalX - xMin) / bodyLen;
        const dorsalRadius = (1.0 + (swell - 1.0) * Math.sin(dorsalU * Math.PI)) * bodyHeight * 1.15;
        
        const dorsalMesh = buildExtrudedFin(dPoints, 0.08, '#7B4F2E', true);
        dorsalMesh.position.set(params.dorsalX, dorsalRadius - 0.1, 0);
        dorsalMesh.rotation.y = 0; // Spun 90 degrees relative to original sagittal plane orientation
        group.add(dorsalMesh);

        // 4. VENTRAL FIN (Downward, underside center)
        const vScale = params.ventralScale;
        const vPoints = [
          new THREE.Vector2(0, 0),
          new THREE.Vector2(0.3 * vScale, -0.7 * vScale), // pointing down
          new THREE.Vector2(0.8 * vScale, 0)
        ];
        const ventralU = (params.ventralX - xMin) / bodyLen;
        const ventralRadius = (1.0 + (swell - 1.0) * Math.sin(ventralU * Math.PI)) * bodyHeight * 1.15;

        const ventralMesh = buildExtrudedFin(vPoints, 0.08, '#7B4F2E', false);
        ventralMesh.position.set(params.ventralX, -ventralRadius + 0.1, 0);
        ventralMesh.rotation.y = 0; // Spun 90 degrees relative to original sagittal plane orientation
        group.add(ventralMesh);

        // 5. THE EYES (Large, dark, oval, positioned on side upper-front)
        // Create left & right eyes for beautiful 3D view symmetry
        const eyeSize = params.eyeSize;
        const eyeX = params.eyeX;
        const eyeY = params.eyeY;
        
        // Calculate eye offset from centerline based on body geometry
        const eyeU = (eyeX - xMin) / bodyLen;
        const eyeRadiusAtX = (0.3 + 0.7 * Math.sin(eyeU * Math.PI / 2)) * bodyHeight * 1.2;

        const renderEye = (isLeftSide) => {
          const zSign = isLeftSide ? 1 : -1;
          const zPos = eyeRadiusAtX * 0.85 * zSign;

          if (isRecycled) {
            // Recycled bottle-cap look! A cylinder oriented sideways
            const capGroup = new THREE.Group();
            
            // Outer cap cylinder
            const capGeo = new THREE.CylinderGeometry(eyeSize, eyeSize, 0.12, 16);
            capGeo.rotateX(Math.PI / 2);
            const capMat = new THREE.MeshStandardMaterial({
              color: '#2563eb', // plastic blue caps
              roughness: 0.1,
              metalness: 0.1
            });
            const capMesh = new THREE.Mesh(capGeo, capMat);
            capGroup.add(capMesh);

            // Pupil painted on cardboard circle inside
            const innerGeo = new THREE.CylinderGeometry(eyeSize * 0.6, eyeSize * 0.6, 0.02, 16);
            innerGeo.rotateX(Math.PI / 2);
            const innerMat = new THREE.MeshStandardMaterial({ color: '#111827', roughness: 0.8 });
            const innerMesh = new THREE.Mesh(innerGeo, innerMat);
            innerMesh.position.z = 0.06 * zSign;
            capGroup.add(innerMesh);

            capGroup.position.set(eyeX, eyeY, zPos);
            capGroup.rotation.y = isLeftSide ? 0.3 : -0.3;
            group.add(capGroup);
          } else {
            // Organic eye: Large shiny black oval sphere
            const eyeGeo = new THREE.SphereGeometry(eyeSize, 32, 16);
            eyeGeo.scale(1.1, 1.1, 0.5); // flat oval
            
            const eyeMat = new THREE.MeshStandardMaterial({
              color: '#0a0a0a',
              roughness: 0.08,
              metalness: 0.0
            });
            const eyeMesh = new THREE.Mesh(eyeGeo, eyeMat);
            eyeMesh.position.set(eyeX, eyeY, zPos);
            // Angle eye slightly outward
            eyeMesh.rotation.y = isLeftSide ? 0.4 : -0.4;
            group.add(eyeMesh);

            // Wet Specular Highlight (Tiny shiny white reflection bubble)
            const bubbleGeo = new THREE.SphereGeometry(0.045, 8, 8);
            const bubbleMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
            const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
            bubble.position.set(eyeX - 0.05, eyeY + 0.08, zPos + (0.16 * zSign));
            group.add(bubble);
          }
        };

        renderEye(true);  // Left Eye
        renderEye(false); // Right Eye

        // 6. THE MOUTH (Jagged bone teeth, forward & below the eye)
        const renderMouth = (isLeftSide) => {
          const zSign = isLeftSide ? 1 : -1;
          const mouthX = eyeX - 0.5;
          const mouthY = -0.3;
          const mouthZ = eyeRadiusAtX * 0.68 * zSign;

          const mouthGroup = new THREE.Group();

          // Dark mouth slot
          const lineGeo = new THREE.BoxGeometry(0.6, 0.04, 0.05);
          const lineMat = new THREE.MeshStandardMaterial({ color: '#1c1917', roughness: 0.9 });
          const line = new THREE.Mesh(lineGeo, lineMat);
          mouthGroup.add(line);

          // Bone white sharp jagged teeth
          const teethCount = 4;
          const toothMat = new THREE.MeshStandardMaterial({
            color: isRecycled ? '#f3f4f6' : '#FFFAF0', // plastic cutout vs bone white
            roughness: 0.4
          });

          for (let k = 0; k < teethCount; k++) {
            const tx = -0.22 + (k * 0.15);
            // Top teeth pointing down
            const topToothGeo = new THREE.ConeGeometry(0.04, 0.09, 4);
            topToothGeo.rotateX(Math.PI); // flip down
            const topTooth = new THREE.Mesh(topToothGeo, toothMat);
            topTooth.position.set(tx, 0.03, 0.02 * zSign);
            mouthGroup.add(topTooth);

            // Bottom teeth pointing up (offset)
            const btmToothGeo = new THREE.ConeGeometry(0.04, 0.09, 4);
            const btmTooth = new THREE.Mesh(btmToothGeo, toothMat);
            btmTooth.position.set(tx + 0.07, -0.03, 0.02 * zSign);
            mouthGroup.add(btmTooth);
          }

          mouthGroup.position.set(mouthX, mouthY, mouthZ);
          mouthGroup.rotation.y = isLeftSide ? 0.3 : -0.3;
          group.add(mouthGroup);
        };

        renderMouth(true);
        renderMouth(false);

        // 7. SQUID ARMS & RED FEEDING TENTACLES (8 arms + 2 longer red tentacles)
        const tLen = params.tentacleLength;
        const rearCapX = xMax;
        const baseRadius = (swell - (swell - 0.8)) * bodyHeight * 0.95; // tail width

        const chains = [];
        const appendages = [];

        // 1. Add 8 regular arms
        for (let i = 0; i < 8; i++) {
          const theta = (i / 8) * Math.PI * 2;
          appendages.push({
            theta: theta,
            isFeedingTentacle: false,
            length: tLen,
            color: '#EDE8DC',
            recycledColor: '#9ca3af',
            baseRadiusScale: 0.13
          });
        }

        // 2. Add 2 longer red tentacles in the gaps (positioned symmetrically left & right)
        // Angles 1.5/8 and 5.5/8 are perfect side-gaps to nestle the red tentacles nicely
        const tentacleAngles = [
          (1.5 / 8) * Math.PI * 2,
          (5.5 / 8) * Math.PI * 2
        ];
        tentacleAngles.forEach(theta => {
          appendages.push({
            theta: theta,
            isFeedingTentacle: true,
            length: tLen * 1.35,      // slightly longer than regular arms
            color: '#C23B22',          // beautiful organic deep crimson red
            recycledColor: '#ef4444',  // bright red plastic hose/materials
            baseRadiusScale: 0.11      // slightly thinner/more delicate structure
          });
        });

        appendages.forEach((app, i) => {
          const theta = app.theta;
          
          // Outer radius placement around rear cap
          const startY = baseRadius * 0.6 * Math.sin(theta);
          const startZ = baseRadius * 0.6 * Math.cos(theta);

          // Root joint of appendage
          const baseJoint = new THREE.Group();
          baseJoint.position.set(rearCapX - 0.15, startY, startZ);
          
          // Splay outward slightly
          baseJoint.rotation.z = Math.sin(theta) * 0.25;
          baseJoint.rotation.y = -Math.cos(theta) * 0.25;

          group.add(baseJoint);

          // Build joint-chain for smooth waving
          const jointsInChain = [];
          let parentNode = baseJoint;
          const segmentsCount = app.isFeedingTentacle ? 10 : 8; // more joints for longer, more fluid tentacles
          const segmentLen = app.length / segmentsCount;

          for (let j = 0; j < segmentsCount; j++) {
            const jointGroup = new THREE.Group();
            jointGroup.position.set(j === 0 ? 0 : segmentLen, 0, 0);

            // Tapering scale along length
            let taperFactor = Math.pow(0.85, j);
            
            // Feeding tentacles flare out at the tip to represent the signature "tentacular clubs" of squids
            let shapeModifier = 1.0;
            if (app.isFeedingTentacle && j >= segmentsCount - 2) {
              shapeModifier = 1.8;
              taperFactor = Math.pow(0.85, segmentsCount - 4); // maintain thicker size for the paddle
            }
            
            const tRadius = app.baseRadiusScale * taperFactor * bodyHeight * shapeModifier;

            let segMesh;
            if (isRecycled) {
              // Flexible corrugated hose structure (ridged rings)
              const hoseGroup = new THREE.Group();
              const subRings = 3;
              for (let r = 0; r < subRings; r++) {
                const isBig = r % 2 === 0;
                const rGeo = new THREE.CylinderGeometry(
                  tRadius * (isBig ? 1.15 : 0.9), 
                  tRadius * (isBig ? 1.15 : 0.9), 
                  segmentLen / subRings, 
                  8
                );
                rGeo.rotateZ(Math.PI / 2);
                const rMat = new THREE.MeshStandardMaterial({
                  color: app.recycledColor,
                  roughness: 0.45,
                  metalness: app.isFeedingTentacle ? 0.05 : 0.15 // red plastic vs metallic silver grey hoses
                });
                const rMesh = new THREE.Mesh(rGeo, rMat);
                rMesh.position.x = (r + 0.5) * (segmentLen / subRings);
                hoseGroup.add(rMesh);
              }
              segMesh = hoseGroup;
            } else {
              // Organic soft squid skin
              let segGeo;
              if (app.isFeedingTentacle && j >= segmentsCount - 2) {
                // Flat/oval paddle-like shape for squid tentacle club
                segGeo = new THREE.SphereGeometry(tRadius, 8, 8);
                segGeo.scale(1.5, 0.7, 1.2);
              } else {
                segGeo = new THREE.CylinderGeometry(tRadius * 0.85, tRadius, segmentLen, 12);
                segGeo.rotateZ(Math.PI / 2);
              }
              
              const segMat = new THREE.MeshStandardMaterial({
                color: app.color,
                transparent: true,
                opacity: 0.92,
                roughness: 0.4,
                wireframe: showWireframe
              });
              segMesh = new THREE.Mesh(segGeo, segMat);
              segMesh.position.x = segmentLen / 2;
            }

            jointGroup.add(segMesh);
            parentNode.add(jointGroup);
            jointsInChain.push(jointGroup);
            parentNode = jointGroup;
          }

          chains.push(jointsInChain);
        });

        tentacleChainsRef.current = chains;

      }, [params, renderStyle, showWireframe, modelOpacity, viewMode]);

      // UPDATE OPACITIES FOR THE MATCHING LAYER
      useEffect(() => {
        if (refPlaneRef.current) {
          refPlaneRef.current.material.opacity = referenceOpacity;
          refPlaneRef.current.material.needsUpdate = true;
        }
      }, [referenceOpacity]);

      return (
        <div class="flex flex-col lg:flex-row h-full w-full overflow-hidden">
          
          {/* LEFT SIDEBAR CONTROLS */}
          <div class="w-full lg:w-[420px] bg-neutral-950 border-b lg:border-b-0 lg:border-r border-neutral-800 flex flex-col h-[40%] lg:h-full z-10 select-none shadow-2xl">
            
            {/* Header Block */}
            <div class="p-5 border-b border-neutral-800 bg-neutral-900/60 flex items-center justify-between">
              <div>
                <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-amber-200 to-[#F5ECD7] bg-clip-text text-transparent">
                  Bruno's Deep Sea Lab
                </h1>
                <p class="text-xs text-neutral-400 font-semibold tracking-wide">
                  GOBLIN SHARK × GIANT SQUID
                </p>
              </div>
              <button 
                onClick={toggleSound}
                className={`p-2.5 rounded-xl border flex items-center justify-center transition-all ${
                  soundEnabled 
                    ? 'bg-amber-900/40 border-amber-600 text-amber-200 shadow-lg' 
                    : 'bg-neutral-900 border-neutral-800 text-neutral-400 hover:text-white'
                }`}
                title="Toggle Ocean Depth Ambient"
              >
                {soundEnabled ? (
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                  </svg>
                ) : (
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                  </svg>
                )}
              </button>
            </div>

            {/* TAB CONTAINER */}
            <div class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-6">
              
              {/* STAGE & VIEW SWITCHER */}
              <div class="space-y-3">
                <label class="text-xs font-bold text-neutral-400 uppercase tracking-widest">
                  Visualizer Stage
                </label>
                <div class="grid grid-cols-2 gap-2 bg-neutral-900 p-1 rounded-xl border border-neutral-800">
                  <button 
                    onClick={() => { setViewMode('match'); setAutoRotate(false); }}
                    className={`py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${
                      viewMode === 'match' 
                        ? 'bg-[#7B4F2E] text-[#F5ECD7] shadow' 
                        : 'text-neutral-400 hover:text-white'
                    }`}
                  >
                    📐 Silhouette Match
                  </button>
                  <button 
                    onClick={() => { setViewMode('orbit'); }}
                    className={`py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${
                      viewMode === 'orbit' 
                        ? 'bg-[#7B4F2E] text-[#F5ECD7] shadow' 
                        : 'text-neutral-400 hover:text-white'
                    }`}
                  >
                    🌐 Free 3D Orbit
                  </button>
                </div>
              </div>

              {/* RENDER STYLE SELECTOR */}
              <div class="space-y-3">
                <label class="text-xs font-bold text-neutral-400 uppercase tracking-widest">
                  Rendering Material
                </label>
                <div class="grid grid-cols-2 gap-2 bg-neutral-900 p-1 rounded-xl border border-neutral-800">
                  <button 
                    onClick={() => setRenderStyle('organic')}
                    className={`py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${
                      renderStyle === 'organic' 
                        ? 'bg-[#7B4F2E] text-[#F5ECD7] shadow-lg border-t border-amber-600' 
                        : 'text-neutral-400 hover:text-white'
                    }`}
                  >
                    🎨 Soft Organic Skin
                  </button>
                  <button 
                    onClick={() => setRenderStyle('recycled')}
                    className={`py-2 px-3 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${
                      renderStyle === 'recycled' 
                        ? 'bg-emerald-950 border border-emerald-600 text-emerald-200 shadow-lg' 
                        : 'text-neutral-400 hover:text-white'
                    }`}
                  >
                    ♻️ Recycled Prototype
                  </button>
                </div>
              </div>

              {/* VIEW OPTIONS */}
              <div class="space-y-3 p-4 bg-neutral-900/40 rounded-xl border border-neutral-800">
                <div class="flex items-center justify-between">
                  <span class="text-sm font-semibold text-neutral-300">Wireframe Overlay</span>
                  <input 
                    type="checkbox" 
                    checked={showWireframe} 
                    onChange={(e) => setShowWireframe(e.target.checked)} 
                    className="w-4 h-4 rounded border-neutral-700 text-amber-600 focus:ring-amber-500 bg-neutral-800"
                  />
                </div>
                {viewMode === 'match' && (
                  <div class="space-y-2 pt-2 border-t border-neutral-800">
                    <div class="flex items-center justify-between text-xs text-neutral-400">
                      <span>Drawing Opacity:</span>
                      <span class="font-mono">{Math.round(referenceOpacity * 100)}%</span>
                    </div>
                    <input 
                      type="range" 
                      min="0.0" 
                      max="1.0" 
                      step="0.05" 
                      value={referenceOpacity} 
                      onChange={(e) => setReferenceOpacity(parseFloat(e.target.value))}
                      className="w-full accent-amber-500 cursor-pointer"
                    />
                    <div class="flex items-center justify-between text-xs text-neutral-400 mt-2">
                      <span>Solid Model Opacity:</span>
                      <span class="font-mono">{Math.round(modelOpacity * 100)}%</span>
                    </div>
                    <input 
                      type="range" 
                      min="0.1" 
                      max="1.0" 
                      step="0.05" 
                      value={modelOpacity} 
                      onChange={(e) => setModelOpacity(parseFloat(e.target.value))}
                      className="w-full accent-amber-500 cursor-pointer"
                    />
                  </div>
                )}
                {viewMode === 'orbit' && (
                  <div class="flex items-center justify-between pt-2 border-t border-neutral-800">
                    <span class="text-sm font-semibold text-neutral-300">Slow Auto-Rotate</span>
                    <input 
                      type="checkbox" 
                      checked={autoRotate} 
                      onChange={(e) => setAutoRotate(e.target.checked)} 
                      className="w-4 h-4 rounded border-neutral-700 text-amber-600 focus:ring-amber-500 bg-neutral-800"
                    />
                  </div>
                )}
              </div>

              {/* SECTION: ANATOMY TUNERS */}
              <div class="space-y-4 pt-2">
                <div class="flex items-center justify-between">
                  <label class="text-xs font-bold text-neutral-400 uppercase tracking-widest">
                    Anatomy Alignment Sliders
                  </label>
                  <button 
                    onClick={resetParams}
                    className="text-xs font-bold text-amber-500 hover:text-amber-400 transition-colors flex items-center gap-1"
                  >
                    ↺ Reset Shape
                  </button>
                </div>

                <div class="space-y-3.5">
                  {/* Body Length */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Body Length (Bottle/Tube)</span>
                      <span class="text-neutral-400 font-mono">{params.bodyLength}x</span>
                    </div>
                    <input 
                      type="range" min="3.0" max="6.0" step="0.1" 
                      value={params.bodyLength} 
                      onChange={(e) => updateParam('bodyLength', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Body Height */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Body Height (Swell Depth)</span>
                      <span class="text-neutral-400 font-mono">{params.bodyHeight}x</span>
                    </div>
                    <input 
                      type="range" min="0.7" max="1.7" step="0.05" 
                      value={params.bodyHeight} 
                      onChange={(e) => updateParam('bodyHeight', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Body Rear Swell */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Rear Swell (Wider at tail cap)</span>
                      <span class="text-neutral-400 font-mono">{params.bodyRearSwell}x</span>
                    </div>
                    <input 
                      type="range" min="0.9" max="2.0" step="0.05" 
                      value={params.bodyRearSwell} 
                      onChange={(e) => updateParam('bodyRearSwell', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Rostrum Length */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Snout / Rostrum Length (Cone)</span>
                      <span class="text-neutral-400 font-mono">{params.rostrumLength}x</span>
                    </div>
                    <input 
                      type="range" min="1.5" max="4.5" step="0.1" 
                      value={params.rostrumLength} 
                      onChange={(e) => updateParam('rostrumLength', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Eye Location X */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Eye Horizontal Location</span>
                      <span class="text-neutral-400 font-mono">{params.eyeX}x</span>
                    </div>
                    <input 
                      type="range" min="-2.0" max="-0.2" step="0.05" 
                      value={params.eyeX} 
                      onChange={(e) => updateParam('eyeX', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Eye Size */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Eye Size (Cap diameter)</span>
                      <span class="text-neutral-400 font-mono">{params.eyeSize}x</span>
                    </div>
                    <input 
                      type="range" min="0.12" max="0.45" step="0.01" 
                      value={params.eyeSize} 
                      onChange={(e) => updateParam('eyeSize', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Dorsal Fin Scale */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Dorsal Fin Size</span>
                      <span class="text-neutral-400 font-mono">{params.dorsalScale}x</span>
                    </div>
                    <input 
                      type="range" min="0.5" max="2.0" step="0.05" 
                      value={params.dorsalScale} 
                      onChange={(e) => updateParam('dorsalScale', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Squid Tentacles Length */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Tentacle/Arm Length (Appendages)</span>
                      <span class="text-neutral-400 font-mono">{params.tentacleLength}x</span>
                    </div>
                    <input 
                      type="range" min="2.0" max="6.5" step="0.1" 
                      value={params.tentacleLength} 
                      onChange={(e) => updateParam('tentacleLength', e.target.value)}
                      className="w-full"
                    />
                  </div>

                  {/* Tentacle Waving Wiggle */}
                  <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-medium">
                      <span class="text-neutral-300">Waving Intensity / Curliness</span>
                      <span class="text-neutral-400 font-mono">{params.tentacleWiggle}x</span>
                    </div>
                    <input 
                      type="range" min="0.0" max="3.5" step="0.1" 
                      value={params.tentacleWiggle} 
                      onChange={(e) => updateParam('tentacleWiggle', e.target.value)}
                      className="w-full"
                    />
                  </div>
                </div>
              </div>

              {/* SECTION: RECYCLED CRAFTING TOOLBOX */}
              <div class="border-t border-neutral-800 pt-6 space-y-4">
                <div>
                  <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-1.5">
                    <span>♻️</span> Bruno's Crafting Toolbox
                  </h3>
                  <p class="text-xs text-neutral-400 mt-1">
                    Visualize the model using trash & help Bruno gather physical recycled materials!
                  </p>
                </div>

                <div class="space-y-2.5">
                  <div 
                    onClick={() => handleCheck('bodyBottle')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.bodyBottle 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.bodyBottle} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Body: 2L Green Soda Bottle</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Empty, wash, and keep the cylinder label-free (or with a vintage soda badge).</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('snoutCardboard')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.snoutCardboard 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.snoutCardboard} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Snout: Rolled Thin Cardboard Cone</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Cut a cereal box flat, roll tightly into a spear-cone, secure with tape.</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('finsShipping')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.finsShipping 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.finsShipping} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Fins: Corrugated Shipping Cardboard</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Draw flat dorsal & ventral triangles, cut out so the wavy inner layers show!</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('eyeBottleCap')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.eyeBottleCap 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.eyeBottleCap} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Eyes: Plastic Juice/Milk Bottle Caps</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Glue two dark caps sideways onto the upper-front. Draw pupils inside!</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('teethEggCarton')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.teethEggCarton 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.teethEggCarton} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Teeth: Jagged Egg Carton Spikes</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Cut the cone-shaped divides inside a cardboard or foam egg container.</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('tentaclesNewspaper')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.tentaclesNewspaper 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.tentaclesNewspaper} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Squid Arms: Newspaper Rolls (8 arms)</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Roll sheets of newsprint tightly, curl them by wrapping around a broom handle!</div>
                    </div>
                  </div>

                  <div 
                    onClick={() => handleCheck('redTentaclesHose')}
                    class={`p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all ${
                      checklist.redTentaclesHose 
                        ? 'bg-emerald-950/20 border-emerald-800 text-emerald-200' 
                        : 'bg-neutral-900 border-neutral-800 text-neutral-300 hover:border-neutral-700'
                    }`}
                  >
                    <input type="checkbox" checked={checklist.redTentaclesHose} readOnly className="mt-1 accent-emerald-500 rounded" />
                    <div>
                      <div class="text-xs font-bold">Feeding Tentacles: Red Straws or Red Yarn (2 long tentacles)</div>
                      <div class="text-[10px] text-neutral-400 mt-0.5">Craft two extra-long tentacles, color them bright red, and flare the tips like a real squid!</div>
                    </div>
                  </div>
                </div>
              </div>

            </div>

            {/* Footer Brand info */}
            <div class="p-4 border-t border-neutral-800 bg-neutral-950 text-center text-[10px] text-neutral-500 font-mono">
              Designed dynamically for Bruno's Deep Sea Project • © 2026
            </div>
          </div>

          {/* MAIN VIEWPORT */}
          <div class="flex-1 relative h-[60%] lg:h-full w-full">
            
            {/* STAGE DESCRIPTION HEADER CARDS */}
            <div class="absolute top-4 left-4 right-4 z-10 flex flex-col sm:flex-row gap-3 justify-between pointer-events-none select-none">
              
              {/* Left Stage HUD card */}
              <div class="backdrop-blur-md bg-neutral-950/80 border border-neutral-800 p-4 rounded-2xl max-w-sm pointer-events-auto shadow-2xl">
                <span class="text-[10px] font-extrabold px-2.5 py-1 bg-amber-950 text-amber-200 rounded-full border border-amber-800 uppercase tracking-widest inline-block">
                  {viewMode === 'match' ? "Phase 1: Proportions Matching" : "Phase 2: 3D Visualization unlocked"}
                </span>
                
                <h2 class="text-base font-extrabold mt-2 text-[#F5ECD7] flex items-center gap-1.5">
                  {viewMode === 'match' ? (
                    <>
                      <span>📐</span> Align with Bruno's Drawing
                    </>
                  ) : (
                    <>
                      <span>🌐</span> Explorer Mode Ready
                    </>
                  )}
                </h2>
                
                <p class="text-xs text-neutral-400 mt-1 leading-relaxed">
                  {viewMode === 'match' 
                    ? "We are in 2D Orthographic side view. Drag sliders to adjust the 3D creature wireframe to match the underlying pencil blueprint silhouette perfectly."
                    : "Use mouse/touch to orbit, pan, or zoom! The arms sway realistically mimicking a deep-sea creature cruising in the dark."}
                </p>

                {viewMode === 'match' && (
                  <button 
                    onClick={() => { setViewMode('orbit'); }}
                    class="mt-3.5 w-full py-2 px-3 bg-gradient-to-r from-amber-600 to-yellow-600 text-[#F5ECD7] rounded-xl text-xs font-extrabold flex items-center justify-center gap-1.5 hover:opacity-90 active:scale-95 transition-all shadow-md crafting-btn-glow"
                  >
                    <span>🚀</span> Align Finished! Unlock 3D View
                  </button>
                )}
              </div>

              {/* Right Recycled Materials Tips HUD card */}
              <div class="backdrop-blur-md bg-neutral-950/80 border border-neutral-800 p-4 rounded-2xl max-w-sm pointer-events-auto shadow-2xl hidden sm:block">
                <h3 class="text-xs font-extrabold text-emerald-400 uppercase tracking-widest flex items-center gap-1">
                  <span>💡</span> Recycled Material Tip
                </h3>
                <p class="text-xs text-neutral-300 mt-2 leading-relaxed">
                  {renderStyle === 'recycled' 
                    ? "In prototype mode, notice how the soda label aligns with the midsection and the corrugated cardboard lines run horizontally along the fins. Keep these aligned when gluing!"
                    : "Toggle the material button at bottom-left to 'Recycled' to visualize how household crafting materials compile together."}
                </p>
                <button 
                  onClick={() => setRenderStyle(prev => prev === 'organic' ? 'recycled' : 'organic')}
                  class="mt-3 text-xs font-bold text-emerald-400 hover:text-emerald-300 flex items-center gap-1 transition-colors"
                >
                  Swap render model: {renderStyle === 'organic' ? "♻️ Recycled" : "🎨 Organic"}
                </button>
              </div>

            </div>

            {/* THREE.JS CANVAS */}
            <canvas ref={canvasRef} class="w-full h-full block" />

            {/* LOWER BLUEPRINT INSTRUCTION / STATUS LABELS */}
            <div class="absolute bottom-4 left-4 right-4 z-10 pointer-events-none flex flex-col sm:flex-row items-center justify-between gap-3">
              
              {/* Toggle guide shortcut */}
              <div class="backdrop-blur-md bg-black/60 border border-neutral-900 px-3 py-2 rounded-xl text-[11px] text-neutral-400 font-mono tracking-wider flex items-center gap-1.5 pointer-events-auto">
                <span>Rendering Mode:</span>
                <span class={`font-extrabold ${renderStyle === 'organic' ? 'text-amber-400' : 'text-emerald-400'}`}>
                  {renderStyle === 'organic' ? "ORGANIC gradients" : "RECYCLED packaging"}
                </span>
              </div>

              {/* Center status label - Bruno's signature requested in prompt */}
              <div class="backdrop-blur-md bg-black/60 border border-neutral-900 py-2 px-4 rounded-xl text-center shadow-lg">
                <span class="text-xs sm:text-sm font-sans font-medium text-neutral-300 tracking-wide opacity-80">
                  Bruno's Deep Sea Creature — <span class="text-[#F5ECD7]">Goblin Shark × Giant Squid</span>
                </span>
              </div>

              {/* Controls guide HUD */}
              <div class="hidden md:flex backdrop-blur-md bg-black/60 border border-neutral-900 px-3 py-2 rounded-xl text-[11px] text-neutral-400 font-mono gap-3.5">
                {viewMode === 'match' ? (
                  <span>🖱️ Sliders manipulate shape</span>
                ) : (
                  <>
                    <span>🖱️ Left-Click + Drag: Orbit</span>
                    <span>☿ Right-Click + Drag: Pan</span>
                    <span>Scroll: Zoom</span>
                  </>
                )}
              </div>

            </div>

          </div>

        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
